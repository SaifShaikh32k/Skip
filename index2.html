<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Warehouse Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 pb-10">

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <div class="bg-white p-4 rounded-xl shadow-sm">
            <h1 class="text-xl font-bold mb-4 text-blue-900">Deep Operations Board</h1>
            
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Shift</label>
                    <select id="shiftFilter" class="w-full mt-1 p-2 border rounded-lg bg-gray-50 text-sm filter-select">
                        <option value="All">All Shifts</option>
                        <option value="Day">Day</option>
                        <option value="Night">Night</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Vertical</label>
                    <select id="verticalFilter" class="w-full mt-1 p-2 border rounded-lg bg-gray-50 text-sm filter-select">
                        <option value="All">Loading...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Floor</label>
                    <select id="floorFilter" class="w-full mt-1 p-2 border rounded-lg bg-gray-50 text-sm filter-select">
                        <option value="All">Loading...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Pathway</label>
                    <select id="pathwayFilter" class="w-full mt-1 p-2 border rounded-lg bg-gray-50 text-sm filter-select">
                        <option value="All">Loading...</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-gray-500 uppercase">Aisle</label>
                    <select id="aisleFilter" class="w-full mt-1 p-2 border rounded-lg bg-gray-50 text-sm filter-select">
                        <option value="All">Loading...</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
                <p class="text-xs text-gray-500 uppercase font-bold">Rows (Filtered)</p>
                <p id="kpi-total" class="text-2xl font-black text-gray-800">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-emerald-500">
                <p class="text-xs text-gray-500 uppercase font-bold">Total Qty</p>
                <p id="kpi-qty" class="text-2xl font-black text-gray-800">0</p>
            </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm">
            <h2 class="text-sm font-bold text-gray-700 mb-2">Volume by WID</h2>
            <canvas id="widChart" height="200"></canvas>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm">
            <h2 class="text-sm font-bold text-gray-700 mb-2">Tasks by Assigned Picker</h2>
            <canvas id="assignedChart" height="200"></canvas>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm">
            <h2 class="text-sm font-bold text-gray-700 mb-2">Volume by Vertical</h2>
            <canvas id="verticalChart" height="200"></canvas>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm overflow-hidden">
            <h2 class="text-sm font-bold text-gray-700 mb-2">Recent Filtered Records</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs whitespace-nowrap">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600">
                            <th class="p-2 border-b">Assigned To</th>
                            <th class="p-2 border-b">WID</th>
                            <th class="p-2 border-b">Loc (F-P-A)</th>
                            <th class="p-2 border-b">Vertical</th>
                            <th class="p-2 border-b">Qty</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Google Sheet CSV Export Link
        const SHEET_ID = '1VGcAyTHOepHiUQuXVmJCLrbbnx2Mx4eF1XqUwbDcJNA';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

        let rawData = [];
        
        // Chart instances
        let widChartInstance = null;
        let assignedChartInstance = null;
        let verticalChartInstance = null;

        // Initialize App
        function init() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    rawData = results.data.filter(row => row.TL_ID); // Ensure row is valid
                    populateDynamicDropdowns();
                    updateDashboard();
                }
            });

            // Attach event listeners to all select dropdowns
            document.querySelectorAll('.filter-select').forEach(select => {
                select.addEventListener('change', updateDashboard);
            });
        }

        // Auto-extract unique values for the filters
        function populateDynamicDropdowns() {
            const getUnique = (key) => ['All', ...new Set(rawData.map(item => item[key]).filter(Boolean))].sort();

            const populateSelect = (id, options) => {
                const select = document.getElementById(id);
                select.innerHTML = '';
                options.forEach(opt => {
                    const label = opt === 'All' ? `All` : opt;
                    select.innerHTML += `<option value="${opt}">${label}</option>`;
                });
            };

            populateSelect('verticalFilter', getUnique('cms_vertical'));
            populateSelect('floorFilter', getUnique('Floor'));
            populateSelect('pathwayFilter', getUnique('Pathway'));
            populateSelect('aisleFilter', getUnique('Aisle'));
        }

        function updateDashboard() {
            // Get current filter values
            const filters = {
                Shift: document.getElementById('shiftFilter').value,
                cms_vertical: document.getElementById('verticalFilter').value,
                Floor: document.getElementById('floorFilter').value,
                Pathway: document.getElementById('pathwayFilter').value,
                Aisle: document.getElementById('aisleFilter').value
            };

            // Apply Filters to data
            const filteredData = rawData.filter(row => {
                return Object.keys(filters).every(key => {
                    return filters[key] === 'All' || row[key] === filters[key];
                });
            });

            updateKPIs(filteredData);
            
            // Update the three charts
            widChartInstance = renderChart('widChart', widChartInstance, filteredData, 'wid', '#8b5cf6', 'WID');
            assignedChartInstance = renderChart('assignedChart', assignedChartInstance, filteredData, 'picklist_assigned_to', '#f97316', 'Picker', true);
            verticalChartInstance = renderChart('verticalChart', verticalChartInstance, filteredData, 'cms_vertical', '#3b82f6', 'Vertical');
            
            updateTable(filteredData);
        }

        function updateKPIs(data) {
            document.getElementById('kpi-total').innerText = data.length;
            const totalQty = data.reduce((sum, row) => sum + (parseInt(row.quantity || row.Qty) || 0), 0);
            document.getElementById('kpi-qty').innerText = totalQty;
        }

        // Generic function to render bar charts
        function renderChart(canvasId, chartInstance, data, dataKey, color, labelName, normalizeUpper = false) {
            const counts = {};
            data.forEach(row => {
                let val = row[dataKey] || 'Unknown';
                // Group CA.123 and ca.123 together
                if (normalizeUpper) val = val.toString().toUpperCase(); 
                counts[val] = (counts[val] || 0) + 1;
            });

            // Sort data by volume descending
            const sortedKeys = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
            const sortedValues = sortedKeys.map(k => counts[k]);

            const ctx = document.getElementById(canvasId).getContext('2d');
            
            if (chartInstance) chartInstance.destroy();
            
            return new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sortedKeys,
                    datasets: [{
                        label: `Count by ${labelName}`,
                        data: sortedValues,
                        backgroundColor: color,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });
        }

        function updateTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            // Show max 15 rows for mobile performance
            const displayData = data.slice(0, 15); 
            
            displayData.forEach(row => {
                const tr = document.createElement('tr');
                const picker = (row.picklist_assigned_to || '').toUpperCase();
                const loc = `${row.Floor || '-'}/${row.Pathway || '-'}/${row.Aisle || '-'}`;
                
                tr.innerHTML = `
                    <td class="p-2 border-b font-medium text-gray-700">${picker}</td>
                    <td class="p-2 border-b text-blue-600">${row.wid || '-'}</td>
                    <td class="p-2 border-b text-gray-500">${loc}</td>
                    <td class="p-2 border-b">${row.cms_vertical}</td>
                    <td class="p-2 border-b font-bold">${row.quantity || row.Qty}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Run when page loads
        window.onload = init;
    </script>
</body>
</html>
