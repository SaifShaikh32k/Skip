<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 text-gray-800">

    <div class="max-w-md mx-auto p-4 space-y-4">
        <div class="bg-white p-4 rounded-xl shadow-sm">
            <h1 class="text-xl font-bold mb-4">Operations Dashboard</h1>
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase">Shift</label>
                    <select id="shiftFilter" class="w-full mt-1 p-2 border rounded-lg bg-gray-50 text-sm">
                        <option value="All">All Shifts</option>
                        <option value="Day">Day</option>
                        <option value="Night">Night</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase">Status</label>
                    <select id="statusFilter" class="w-full mt-1 p-2 border rounded-lg bg-gray-50 text-sm">
                        <option value="All">All Statuses</option>
                        <option value="COMPLETED">Completed</option>
                        <option value="cancelled">Cancelled</option>
                        <option value="sent_for_planning">Planning</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
                <p class="text-xs text-gray-500 uppercase font-semibold">Total Items</p>
                <p id="kpi-total" class="text-2xl font-bold">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-green-500">
                <p class="text-xs text-gray-500 uppercase font-semibold">Total Qty</p>
                <p id="kpi-qty" class="text-2xl font-bold">0</p>
            </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm">
            <h2 class="text-sm font-bold text-gray-700 mb-2">Volume by Vertical</h2>
            <canvas id="verticalChart" height="200"></canvas>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm overflow-hidden">
            <h2 class="text-sm font-bold text-gray-700 mb-2">Recent Records</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs whitespace-nowrap">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600">
                            <th class="p-2 border-b">TL_ID</th>
                            <th class="p-2 border-b">Vertical</th>
                            <th class="p-2 border-b">Status</th>
                            <th class="p-2 border-b">Shift</th>
                            <th class="p-2 border-b">Qty</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Google Sheet CSV Export Link
        const SHEET_ID = '1VGcAyTHOepHiUQuXVmJCLrbbnx2Mx4eF1XqUwbDcJNA';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

        let rawData = [];
        let myChart = null;

        // Initialize App
        function init() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    rawData = results.data.filter(row => row.TL_ID); // Filter empty rows
                    updateDashboard();
                }
            });

            // Event Listeners for Dropdowns
            document.getElementById('shiftFilter').addEventListener('change', updateDashboard);
            document.getElementById('statusFilter').addEventListener('change', updateDashboard);
        }

        function updateDashboard() {
            const shiftFilter = document.getElementById('shiftFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;

            // Apply Filters
            const filteredData = rawData.filter(row => {
                const matchShift = shiftFilter === 'All' || row.Shift === shiftFilter;
                // Note: Checking both reservation status and picklist status based on your sample
                const matchStatus = statusFilter === 'All' || 
                                    row.reservation_item_status === statusFilter || 
                                    row.picklist_status === statusFilter;
                return matchShift && matchStatus;
            });

            updateKPIs(filteredData);
            updateChart(filteredData);
            updateTable(filteredData);
        }

        function updateKPIs(data) {
            document.getElementById('kpi-total').innerText = data.length;
            const totalQty = data.reduce((sum, row) => sum + (parseInt(row.quantity || row.Qty) || 0), 0);
            document.getElementById('kpi-qty').innerText = totalQty;
        }

        function updateChart(data) {
            const verticalCounts = {};
            data.forEach(row => {
                const v = row.cms_vertical || 'Unknown';
                verticalCounts[v] = (verticalCounts[v] || 0) + 1;
            });

            const ctx = document.getElementById('verticalChart').getContext('2d');
            
            if (myChart) myChart.destroy(); // Clear old chart
            
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(verticalCounts),
                    datasets: [{
                        label: 'Count',
                        data: Object.values(verticalCounts),
                        backgroundColor: '#3b82f6',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });
        }

        function updateTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            // Show max 10 rows for mobile performance
            const displayData = data.slice(0, 10); 
            
            displayData.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-2 border-b">${row.TL_ID.substring(0, 8)}...</td>
                    <td class="p-2 border-b">${row.cms_vertical}</td>
                    <td class="p-2 border-b">
                        <span class="px-2 py-1 bg-gray-100 rounded text-[10px]">${row.reservation_item_status || row.picklist_status}</span>
                    </td>
                    <td class="p-2 border-b">${row.Shift}</td>
                    <td class="p-2 border-b">${row.quantity || row.Qty}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Run when page loads
        window.onload = init;
    </script>
</body>
</html>
